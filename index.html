<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Maestro de Llaves</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 15px; color: #333; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        label { font-weight: bold; font-size: 14px; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* Estilo especial para que el buscador se vea moderno */
        .select2-container--default .select2-selection--single {
            height: 45px; border: 1px solid #ddd; border-radius: 8px; padding-top: 8px;
        }
        
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 25px; }
        button:disabled { background: #ccc; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Llaves</h2>
    
    <label>Nombre del Colaborador</label>
    <input type="text" id="nombre" placeholder="Nombre completo" required>

    <label>Contrato</label>
    <input type="text" id="contrato" placeholder="Ej. 5500123" required>

    <label>Seleccionar Equipo (Use la lupa para buscar)</label>
    <select id="equipo" style="width: 100%;">
        <option value="">Escriba M, B o T para buscar...</option>
    </select>

    <label>Motivo</label>
    <select id="motivo" required>
        <option value="">-- Seleccione Motivo --</option>
        <option value="Carga de combustible">Carga de combustible</option>
        <option value="Revision tecnica">Revisión técnica</option>
        <option value="Lavado de chasis">Lavado de chasis</option>
        <option value="Prueba de ruta">Prueba de ruta</option>
        <option value="Mantención">Mantención</option>
        <option value="Lavado">Lavado</option>
        <option value="Otro">Otro</option>
    </select>

    <button id="btnEnviar" onclick="enviar()">Registrar Salida</button>
    <p id="status"></p>
</div>

<script>
    const URL_GOOGLE_SCRIPT = "https://crisselizaldeherrera-sys.github.io/index/";

    // Generar 9,000 equipos y activar buscador
    $(document).ready(function() {
        const selectEquipo = $('#equipo');
        const tipos = [
            { prefijo: "M-", nombre: "Sprinter", fin: 3000 },
            { prefijo: "B-", nombre: "Bus", fin: 3000 },
            { prefijo: "T-", nombre: "Taxi Bus", fin: 3000 }
        ];

        tipos.forEach(tipo => {
            let optgroup = $('<optgroup label="' + tipo.nombre + '">');
            for (let i = 1; i <= tipo.fin; i++) {
                let num = i.toString().padStart(2, '0');
                let valor = tipo.prefijo + num;
                optgroup.append($('<option>', { value: valor, text: valor }));
            }
            selectEquipo.append(optgroup);
        });

        // ACTIVAR LA LUPA (Select2)
        selectEquipo.select2({
            placeholder: "Escriba para filtrar (ej: B-150)",
            allowClear: true,
            language: { noResults: () => "No se encontró el equipo" }
        });
    });

    function enviar() {
        const btn = document.getElementById('btnEnviar');
        const status = document.getElementById('status');
        
        const datos = {
            nombre: document.getElementById('nombre').value,
            contrato: document.getElementById('contrato').value,
            equipo: $('#equipo').val(),
            motivo: document.getElementById('motivo').value
        };

        if(!datos.nombre || !datos.contrato || !datos.equipo || !datos.motivo) {
            alert("Por favor, complete todos los campos.");
            return;
        }

        btn.disabled = true;
        status.innerText = "⏳ Guardando en la nube...";
        
        fetch(URL_GOOGLE_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(datos)
        }).then(() => {
            status.innerText = "✅ ¡Registro exitoso!";
            status.style.color = "green";
            btn.disabled = false;
            // Limpiar
            document.getElementById('nombre').value = '';
            $('#equipo').val(null).trigger('change');
            document.getElementById('motivo').value = '';
        }).catch(err => {
            status.innerText = "❌ Error. Reintente.";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
